<!doctype html>
<html lang="pt-br" class="">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz@0,14..32;1,14..32&display=swap"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Página pessoal de Gabriel Martorelli – links para GitHub, LinkedIn, Portfólio e redes sociais." />
    <meta property="og:title" content="Marto DevCard" />
    <meta property="og:description" content="Página pessoal de Gabriel Martorelli – links para GitHub, LinkedIn, Portfólio e redes sociais." />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="style.css" />
    <title>Marto DevCard</title>
  </head>
  <body>
    <div id="container">
      <div id="profile">
        <img src="./assets/foto-perfil.png" alt="Foto de perfil de Gabriel Martorelli" />
        <p>Gabriel Martorelli</p>
      </div>
      <div id="switch">
        <button aria-label="Alternar tema claro/escuro"></button>
        <span></span>
      </div>
      <ul>
        <li>
          <a href="https://github.com/martoxm" target="_blank" rel="noopener noreferrer">GitHub</a>
        </li>
        <li>
          <a
            href="https://www.linkedin.com/in/gabrielmartorelli/"
            target="_blank"
            rel="noopener noreferrer"
            >LinkedIn</a
          >
        </li>
        <li>
          <a href="https://martoxm.github.io/portfolio-pessoal/" target="_blank" rel="noopener noreferrer"
            >Portfólio</a
          >
        </li>
      </ul>
      <div id="social-links">
        <a href="https://www.instagram.com/martotune/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <ion-icon name="logo-instagram"></ion-icon
        ></a>
        <a href="https://github.com/martoxm" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <ion-icon name="logo-github"></ion-icon>
        </a>
        <a href="https://www.youtube.com/@martotune" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
          <ion-icon name="logo-youtube"></ion-icon
        ></a>
      </div>
      <footer>© 2026 - Link In Bio de Gabriel Martorelli</footer>
    </div>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
